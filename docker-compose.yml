version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: agri_os_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://agri_user:agri_pass@postgres:5432/agri_db
      - REDIS_URL=redis://redis:6379/0
      - MONGODB_URL=mongodb://mongo:27017/agri_os_legacy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mongo:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgis/postgis:15-3.3
    container_name: agri_os_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=agri_user
      - POSTGRES_PASSWORD=agri_pass
      - POSTGRES_DB=agri_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agri_user -d agri_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: agri_os_cache
    ports:
      - "6379:6379"

  mongo:
    image: mongo:latest
    container_name: agri_os_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
